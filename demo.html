<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>这是一个标题</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header class="blue-bg">
            <h1>这是一个标题</h1>
            <h2>这是一个二级标题</h2>
            <h6>这是一个六级标题</h6>
            <p>这<b>是一个段落</b>。。。。。。<i>看吧看吧，</i>
                <u>没什么好看的。。。</u>
            </p>
        </header>
        
        <main>
            <p>这是一个<span class="aqua-text">段落</span>。。。。。。<span class="violet-text">看吧看吧，</span><br>没什么好看的。。。</p>
            <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=sample%20placeholder%20image&image_size=square" alt="示例图片" width="300" height="200">
            <p><br></p>
            <nav class="external-links">
                <a href="https://www.baidu.com" target="_blank" rel="noopener noreferrer">访问百度</a>
                <a href="https://github.com/" target="_blank" rel="noopener noreferrer">访问 GitHub</a>
            </nav>
        
            <section>
                <h3>有序列表</h3>
                <ol>
                    <li>这是第一项</li>
                    <li>这是第二项</li>
                    <li>这是第三项</li>
                </ol>

                <h3>无序列表</h3>
                <ul>
                    <li>这是第一项</li>
                    <li>这是第二项</li>
                    <li>这是第三项</li>
                </ul>
            </section>
            
            <section>
                <h3>用户数据表</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>年龄</th>
                            <th>性别</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>张三</td>
                            <td>18</td>
                            <td>男</td>
                        </tr>
                        <tr>
                            <td>李四</td>
                            <td>19</td>
                            <td>女</td>
                        </tr>
                        <tr>
                            <td>王五</td>
                            <td>20</td>
                            <td>男</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </body>
</html>
